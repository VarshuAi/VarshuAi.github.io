name: 🎨 Auto Rotate README Theme

on:
  schedule:
    # Runs every day at 00:05 IST (18:35 UTC previous day)
    - cron: '35 18 * * *'
  workflow_dispatch: # Manual trigger button

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🎨 Generate today's theme
        run: python scripts/generate_readme.py

      - name: 📤 Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Theme Bot 🤖"
          git add README.md assets/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "🎨 auto: rotated to $(date +%A)'s theme"
          git push
