<svg xmlns="http://www.w3.org/2000/svg" width="850" height="466" viewBox="0 0 850 466">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes glowPulse { 0%,100% { opacity: 0.2; } 50% { opacity: 0.5; } }
    @keyframes scanMove { 0% { transform: translateY(0); } 100% { transform: translateY(466px); } }

    .bg { fill: #0D1117; }
    .frame { fill: none; stroke: #00FF41; stroke-width: 1; opacity: 0.25; }
    .title { font-family: 'Courier New', monospace; font-size: 13px; fill: #00FF41; font-weight: bold; }
    .bio { font-family: 'Courier New', monospace; font-size: 12.5px; fill: #8B949E; animation: fadeIn 0.3s forwards; opacity: 0; }
    .ok { fill: #00FF41; font-weight: bold; }
    .section { font-family: 'Courier New', monospace; font-size: 12px; fill: #00FF41; opacity: 0.4; }
    .about { font-family: 'Courier New', monospace; font-size: 12.5px; fill: #C9D1D9; animation: fadeIn 0.3s forwards; opacity: 0; }
    .key { fill: #00FF41; font-weight: bold; }
    .motd { font-family: 'Courier New', monospace; font-size: 13px; fill: #A8E6CF; font-style: italic; animation: fadeIn 0.5s forwards; opacity: 0; }
    .cursor { font-family: 'Courier New', monospace; font-size: 13px; fill: #00FF41; animation: blink 1s infinite; }
    .prompt { font-family: 'Courier New', monospace; font-size: 12.5px; fill: #00FF41; animation: fadeIn 0.3s forwards; opacity: 0; }
    .glow { fill: #00FF4144; filter: blur(50px); animation: glowPulse 4s infinite; }
  </style>

  <rect width="850" height="466" class="bg"/>
  <rect x="4" y="4" width="842" height="458" rx="8" class="frame"/>
  <ellipse cx="425" cy="40" rx="250" ry="25" class="glow"/>

